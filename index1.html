<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | My Website</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #007bff, #6610f2);
        color: white;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: "Poppins", sans-serif;
      }
      .coming-soon {
        max-width: 600px;
      }
      h1 {
        font-size: 3rem;
        font-weight: 700;
      }
      p {
        font-size: 1.2rem;
        opacity: 0.9;
      }
      .btn-subscribe {
        background-color: white;
        color: #007bff;
        border: none;
        font-weight: 600;
      }
      .btn-subscribe:hover {
        background-color: #f8f9fa;
        color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="coming-soon">
      <h1>🚀 Coming Soon</h1>
      <p>We're working hard to launch our amazing website. Stay tuned!</p>

      <form class="d-flex justify-content-center mt-4">
        <input
          type="email"
          class="form-control w-50 me-2"
          placeholder="Enter your email"
          required
        />
        <button class="btn btn-subscribe px-4">Notify Me</button>
      </form>

      <div class="mt-4">
        <p class="small">
          © <span id="year"></span> My Website. All rights reserved.
        </p>
      </div>
    </div>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
